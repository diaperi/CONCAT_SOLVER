<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서버와 갈등 상황 시뮬레이션</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Sunflower:wght@300;500;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/hyeeun/css/scenario.css">
</head>
<body>
    <div class="container">
        <h1><솔버와 갈등상황 훈련하기></h1>
        <h2>솔버가 훈련 상황을 드릴게요</h2>
        <button class="click" id="startBtn">이곳을 클릭하세요</button>

        <!-- 갈등 상황 및 대화 부분은 초기에는 숨겨진 상태 -->
        <div id="scenario" style="display: none;">
            <div class="box">
                <p>갈등 상황(대화문 아님, 그냥 상황만)</p>
            </div>

            <div class="scroll-box">
                    <div class="bubble">GPT가 먼저 해당 위 갈등 상황에 대한 대화 시작</div>
                    <div class="bubble2">답변</div>
                    <div class="bubble">지피티 대화내용 (피드백 내용)</div>
            </div>

            <div class="send-container">
                <input type="text" placeholder="여기에 메시지를 입력하세요.">
                <div id="imgBtn" class="icon-container">
                    <img src="img/img-icon.png" alt="이미지 아이콘" class="icon">
                </div>
                <div id="recordBtn" class="icon-container">
                    <img src="img/record-icon.png" alt="녹음 아이콘" class="icon">
                </div>
                <div id="sendBtn" class="icon-container">
                    <img src="img/send-icon.png" alt="전송 아이콘" class="icon">
                </div>
            </div>

            <div class="information">
                <p>솔버와 대화를 시작해보세요.<br>음성톤 분석 사진을 첨부하세요.<br>녹음 아이콘을 누르고 대화 녹음을 시작해요.<br>녹음을 종료 후 전송을 눌러 전송해요.</p>
            </div>
        </div>
    </div>

    <script src="/hyeeun/js/scenario.js"></script>
</body>
</html>
